openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NexusDesk — NITK ECE Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: semesters
    description: Semester management
  - name: courses
    description: Course management
  - name: events
    description: Dynamic event (timetable) management
  - name: attendance
    description: Attendance tracking
  - name: grades
    description: Grade item management
  - name: tasks
    description: Task kanban management
  - name: projects
    description: Hardware project tracking
  - name: cgpa
    description: CGPA simulation
  - name: resources
    description: Course resources
  - name: ingest
    description: AI ingestion engine
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── SEMESTERS ───────────────────────────────────────────────────────
  /semesters:
    get:
      operationId: listSemesters
      tags: [semesters]
      summary: List all semesters
      responses:
        "200":
          description: List of semesters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Semester"
    post:
      operationId: createSemester
      tags: [semesters]
      summary: Create a semester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemesterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Semester"

  /semesters/active:
    get:
      operationId: getActiveSemester
      tags: [semesters]
      summary: Get the active semester
      responses:
        "200":
          description: Active semester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Semester"
        "404":
          description: No active semester

  /semesters/{semesterId}:
    get:
      operationId: getSemester
      tags: [semesters]
      summary: Get a semester by ID
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Semester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Semester"
        "404":
          description: Not found
    patch:
      operationId: updateSemester
      tags: [semesters]
      summary: Update a semester
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemesterUpdate"
      responses:
        "200":
          description: Updated semester
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Semester"

  # ─── COURSES ──────────────────────────────────────────────────────────
  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List courses with attendance stats
      parameters:
        - name: semesterId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Courses with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithStats"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{courseId}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course with full stats
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseWithStats"
        "404":
          description: Not found
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdate"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── EVENTS ───────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events for a date range
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: ISO date string for the target day
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventWithAttendance"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventResult"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithAttendance"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithAttendance"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /events/{eventId}/cancel:
    post:
      operationId: cancelEvent
      tags: [events]
      summary: Cancel an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelEventInput"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWithAttendance"

  # ─── ATTENDANCE ───────────────────────────────────────────────────────
  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: Get attendance summaries per course
      parameters:
        - name: semesterId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  /attendance/mark:
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  # ─── GRADES ───────────────────────────────────────────────────────────
  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List grade items, optionally filtered by course
      parameters:
        - name: courseId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Grade items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeItem"
    post:
      operationId: createGradeItem
      tags: [grades]
      summary: Add a grade item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeItem"

  /grades/{gradeId}:
    patch:
      operationId: updateGradeItem
      tags: [grades]
      summary: Update a grade item
      parameters:
        - name: gradeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeItem"
    delete:
      operationId: deleteGradeItem
      tags: [grades]
      summary: Delete a grade item
      parameters:
        - name: gradeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /grades/course/{courseId}/summary:
    get:
      operationId: getCourseGradeSummary
      tags: [grades]
      summary: Get grade summary for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Grade summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GradeSummary"

  # ─── TASKS ────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks, optionally filtered
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── HARDWARE PROJECTS ────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List hardware projects
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a hardware project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with milestones and logs
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/milestones:
    post:
      operationId: addMilestone
      tags: [projects]
      summary: Add a milestone to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /projects/milestones/{milestoneId}:
    patch:
      operationId: updateMilestone
      tags: [projects]
      summary: Update a milestone
      parameters:
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /projects/{projectId}/logs:
    post:
      operationId: addProjectLog
      tags: [projects]
      summary: Add a log entry to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectLogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectLog"

  # ─── CGPA ─────────────────────────────────────────────────────────────
  /cgpa:
    get:
      operationId: listCgpaRecords
      tags: [cgpa]
      summary: List all CGPA semester records
      responses:
        "200":
          description: CGPA records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CgpaRecord"
    post:
      operationId: createCgpaRecord
      tags: [cgpa]
      summary: Create a CGPA semester record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CgpaRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CgpaRecord"

  /cgpa/{recordId}:
    patch:
      operationId: updateCgpaRecord
      tags: [cgpa]
      summary: Update a CGPA semester record
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CgpaRecordUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CgpaRecord"
    delete:
      operationId: deleteCgpaRecord
      tags: [cgpa]
      summary: Delete a CGPA record
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── RESOURCES ────────────────────────────────────────────────────────
  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List course resources
      parameters:
        - name: courseId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Add a resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{resourceId}:
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── INGEST ───────────────────────────────────────────────────────────
  /ingest:
    post:
      operationId: ingestText
      tags: [ingest]
      summary: AI ingest raw text (timetable, grades, tasks)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestInput"
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "500":
          description: Ingest failed

  # ─── DASHBOARD ────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

# ─── SCHEMAS ──────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Semester ──
    Semester:
      type: object
      required: [id, name, startDate, endDate, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    SemesterInput:
      type: object
      required: [name, startDate, endDate]
      properties:
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isActive:
          type: boolean

    SemesterUpdate:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isActive:
          type: boolean

    # ── Course ──
    Course:
      type: object
      required: [id, subjectCode, name, shortName, creditWeight, minAttendancePct, semesterId, createdAt, updatedAt]
      properties:
        id:
          type: string
        subjectCode:
          type: string
        name:
          type: string
        shortName:
          type: string
        creditWeight:
          type: number
        minAttendancePct:
          type: number
        facultyName:
          type: ["string", "null"]
        roomNumber:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        semesterId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    CourseWithStats:
      type: object
      required: [id, subjectCode, name, shortName, creditWeight, minAttendancePct, semesterId, totalClasses, attended, missed, cancelled, effectivePct, isAtRisk, canSkip, mustAttend, createdAt, updatedAt]
      properties:
        id:
          type: string
        subjectCode:
          type: string
        name:
          type: string
        shortName:
          type: string
        creditWeight:
          type: number
        minAttendancePct:
          type: number
        facultyName:
          type: ["string", "null"]
        roomNumber:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        semesterId:
          type: string
        totalClasses:
          type: integer
        attended:
          type: integer
        missed:
          type: integer
        cancelled:
          type: integer
        effectivePct:
          type: number
        isAtRisk:
          type: boolean
        canSkip:
          type: integer
        mustAttend:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    CourseInput:
      type: object
      required: [subjectCode, name, shortName, creditWeight, semesterId]
      properties:
        subjectCode:
          type: string
        name:
          type: string
        shortName:
          type: string
        creditWeight:
          type: number
        minAttendancePct:
          type: number
        facultyName:
          type: string
        roomNumber:
          type: string
        color:
          type: string
        semesterId:
          type: string

    CourseUpdate:
      type: object
      properties:
        name:
          type: string
        shortName:
          type: string
        creditWeight:
          type: number
        minAttendancePct:
          type: number
        facultyName:
          type: string
        roomNumber:
          type: string
        color:
          type: string

    # ── Event ──
    EventWithAttendance:
      type: object
      required: [id, title, type, startTime, endTime, isCancelled, isRecurring, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        location:
          type: ["string", "null"]
        isCancelled:
          type: boolean
        cancellationNote:
          type: ["string", "null"]
        isRecurring:
          type: boolean
        recurringGroupId:
          type: ["string", "null"]
        courseId:
          type: ["string", "null"]
        courseShortName:
          type: ["string", "null"]
        courseColor:
          type: ["string", "null"]
        attendanceStatus:
          type: ["string", "null"]
        durationMinutes:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    EventInput:
      type: object
      required: [title, type, startTime, endTime]
      properties:
        title:
          type: string
        type:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        location:
          type: string
        courseId:
          type: string
        isRecurring:
          type: boolean
        recurrenceDays:
          type: array
          items:
            type: integer
        recurrenceUntil:
          type: string

    EventUpdate:
      type: object
      properties:
        title:
